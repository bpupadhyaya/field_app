name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: Problem Statement
      description: What problem should this feature solve?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed Solution
      description: Describe the change you want.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives Considered
      description: Optional
    validations:
      required: false
  - type: textarea
    attributes:
      label: Additional Context
      description: Mockups, references, or constraints
    validations:
      required: false
