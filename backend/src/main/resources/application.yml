server:
  port: ${SERVER_PORT:8081}
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/field_app}
    username: ${DB_USER:field_user}
    password: ${DB_PASSWORD:field_pass}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
app:
  jwt:
    secret: ${JWT_SECRET:change_this_to_very_long_secret_change_this_to_very_long_secret}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5174}
  snapshots:
    retain-min-count: ${SNAPSHOT_RETAIN_MIN_COUNT:5}
    max-age-days: ${SNAPSHOT_MAX_AGE_DAYS:30}
