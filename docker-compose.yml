services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: field_app
      POSTGRES_USER: field_user
      POSTGRES_PASSWORD: field_pass
    ports:
      - "5436:5432"
    volumes:
      - field_app_pg:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/field_app
      DB_USER: field_user
      DB_PASSWORD: field_pass
      SERVER_PORT: 8081
      CORS_ALLOWED_ORIGINS: http://localhost:5174
    depends_on:
      - postgres
    ports:
      - "8084:8081"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8081
    ports:
      - "5174:5174"

volumes:
  field_app_pg:
