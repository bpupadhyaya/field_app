apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: field-app-postgres-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: field-app-postgres
spec:
  replicas: 1
  selector: { matchLabels: { app: field-app-postgres } }
  template:
    metadata: { labels: { app: field-app-postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - { name: POSTGRES_DB, value: field_app }
            - { name: POSTGRES_USER, value: field_user }
            - { name: POSTGRES_PASSWORD, value: field_pass }
          ports: [{ containerPort: 5432 }]
          volumeMounts:
            - { name: pgdata, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: pgdata
          persistentVolumeClaim: { claimName: field-app-postgres-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: field-app-postgres
spec:
  selector: { app: field-app-postgres }
  ports:
    - port: 5432
      targetPort: 5432
