apiVersion: apps/v1
kind: Deployment
metadata:
  name: field-app-frontend
spec:
  replicas: 1
  selector: { matchLabels: { app: field-app-frontend } }
  template:
    metadata: { labels: { app: field-app-frontend } }
    spec:
      containers:
        - name: frontend
          image: field-app-frontend:latest
          imagePullPolicy: Never
          ports: [{ containerPort: 5174 }]
---
apiVersion: v1
kind: Service
metadata:
  name: field-app-frontend
spec:
  type: NodePort
  selector: { app: field-app-frontend }
  ports:
    - port: 5174
      targetPort: 5174
      nodePort: 30174
