apiVersion: apps/v1
kind: Deployment
metadata:
  name: field-app-backend
spec:
  replicas: 2
  selector: { matchLabels: { app: field-app-backend } }
  template:
    metadata: { labels: { app: field-app-backend } }
    spec:
      containers:
        - name: backend
          image: field-app-backend:latest
          imagePullPolicy: Never
          env:
            - { name: DB_URL, value: jdbc:postgresql://field-app-postgres:5432/field_app }
            - { name: DB_USER, value: field_user }
            - { name: DB_PASSWORD, value: field_pass }
            - { name: CORS_ALLOWED_ORIGINS, value: http://localhost:5174 }
          ports: [{ containerPort: 8081 }]
---
apiVersion: v1
kind: Service
metadata:
  name: field-app-backend
spec:
  selector: { app: field-app-backend }
  ports:
    - port: 8081
      targetPort: 8081
